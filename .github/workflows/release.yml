name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run gen-icon

      - name: Typecheck
        run: npm run typecheck

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
            "Release $tag already exists; skipping publish."
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version tag
        if: steps.release.outputs.exists != 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rev-parse -q --verify "refs/tags/${{ steps.release.outputs.tag }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            git tag "${{ steps.release.outputs.tag }}"
            git push origin "${{ steps.release.outputs.tag }}"
          }

      - name: Create draft release
        if: steps.release.outputs.exists != 'true'
        run: gh release create ${{ steps.release.outputs.tag }} --draft --title "${{ steps.release.outputs.tag }}" --notes "PixelForge ${{ steps.release.outputs.tag }}" || echo "release already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer and upload update files
        if: steps.release.outputs.exists != 'true'
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: steps.release.outputs.exists != 'true'
        run: gh release edit ${{ steps.release.outputs.tag }} --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
